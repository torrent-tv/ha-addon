name: "Torrent TV Proxy"
description: "Run Torrent TV proxy and connect it to your server."
version: "0.2.64"
slug: "torrent_tv_proxy"
init: false
startup: services
boot: auto
host_network: true
# Map all available video devices (GPU /dev/dri for VAAPI/QSV, /dev/video* for
# V4L2) into the container so the proxy can use hardware-accelerated transcoding
# when present. Host-agnostic: only devices that actually exist are mapped, and
# the proxy auto-detects/falls back to software encoding if none work.
video: true
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
ports:
  9090/tcp: 9090
  9090/udp: 9090
ports_description:
  9090/tcp: "Torrent TV Proxy HTTP API"
  9090/udp: "Torrent TV Proxy WebRTC (UDP range 9090-9099)"
options:
  server_url: "https://webauth.courses"
  token: ""
schema:
  server_url: str
  token: str
